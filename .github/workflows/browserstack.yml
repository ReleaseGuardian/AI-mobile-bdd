name: Mobile BDD Suite - BrowserStack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, prod]

jobs:
  android:
    name: Android (BrowserStack)
    runs-on: ubuntu-latest
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BROWSERSTACK_ANDROID_APP_ID: ${{ secrets.BROWSERSTACK_ANDROID_APP_ID }}
      TEST_ENV: ${{ github.event.inputs.test_env || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Android suite on BrowserStack
        run: npm run test:android:browserstack

      - name: Generate HTML report
        if: always()
        run: npm run report:generate

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-cucumber-report
          path: reports/html

  ios:
    name: iOS (BrowserStack)
    runs-on: ubuntu-latest
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      BROWSERSTACK_IOS_APP_ID: ${{ secrets.BROWSERSTACK_IOS_APP_ID }}
      TEST_ENV: ${{ github.event.inputs.test_env || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run iOS suite on BrowserStack
        run: npm run test:ios:browserstack

      - name: Generate HTML report
        if: always()
        run: npm run report:generate

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-cucumber-report
          path: reports/html
